<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Caveman - 프롬프트 압축기</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 1000px;
            width: 100%;
            padding: 40px;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-bottom: 30px;
        }

        @media (max-width: 768px) {
            .content {
                grid-template-columns: 1fr;
            }
        }

        .section {
            display: flex;
            flex-direction: column;
        }

        label {
            font-weight: 600;
            color: #333;
            margin-bottom: 10px;
            font-size: 14px;
        }

        textarea {
            flex: 1;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-family: 'Monaco', 'Menlo', monospace;
            font-size: 13px;
            resize: vertical;
            min-height: 300px;
            transition: border-color 0.3s;
        }

        textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }

        button {
            padding: 12px 24px;
            font-size: 14px;
            font-weight: 600;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-compress {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            flex: 1;
        }

        .btn-compress:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-copy {
            background: #f0f0f0;
            color: #333;
        }

        .btn-copy:hover {
            background: #e0e0e0;
        }

        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 20px;
        }

        .stat {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
        }

        .stat-value {
            font-size: 20px;
            font-weight: 700;
            color: #667eea;
        }

        .stat-label {
            font-size: 12px;
            color: #999;
            margin-top: 5px;
        }

        .info-box {
            background: #f0f4ff;
            border-left: 4px solid #667eea;
            padding: 15px;
            border-radius: 4px;
            margin-top: 20px;
            font-size: 13px;
            color: #444;
            line-height: 1.6;
        }

        .hidden {
            display: none;
        }

        .loading {
            opacity: 0.6;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🦣 Caveman</h1>
        <p class="subtitle">긴 프롬프트를 간단하게. 토큰을 절약하세요.</p>

        <div class="content">
            <div class="section">
                <label for="input">원본 프롬프트</label>
                <textarea id="input" placeholder="긴 프롬프트를 여기 붙여넣으세요..."></textarea>
            </div>

            <div class="section">
                <label for="output">압축된 프롬프트</label>
                <textarea id="output" readonly placeholder="압축된 결과가 여기 나타납니다..."></textarea>
            </div>
        </div>

        <div class="button-group">
            <button class="btn-compress" onclick="compress()">압축하기</button>
            <button class="btn-copy" onclick="copyOutput()">복사</button>
        </div>

        <div class="stats">
            <div class="stat">
                <div class="stat-value" id="inputTokens">0</div>
                <div class="stat-label">원본 토큰</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="outputTokens">0</div>
                <div class="stat-label">압축 토큰</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="ratio">0%</div>
                <div class="stat-label">압축률</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="savings">0원</div>
                <div class="stat-label">예상 절약액</div>
            </div>
        </div>

        <div class="info-box">
            <strong>💡 Caveman이란?</strong><br>
            불필요한 표현을 제거하고 핵심만 남깁니다. "나 먹고 싶어" vs "저는 지금 음식을 먹고 싶은 마음이 듭니다" - 같은 뜻이지만 훨씬 짧죠?
        </div>
    </div>

    <script src="compress.js"></script>
    <script>
        const inputArea = document.getElementById('input');

        inputArea.addEventListener('input', updateStats);

        function updateStats() {
            const text = inputArea.value;
            const tokens = estimateTokens(text);
            document.getElementById('inputTokens').textContent = tokens;
        }

        function estimateTokens(text) {
            if (!text) return 0;
            // 한글: 1글자 ≈ 1 토큰, 영어: 1단어 ≈ 1.3 토큰
            const koreanCount = (text.match(/[가-힯]/g) || []).length;
            const englishWords = text.split(/\s+/).filter(w => /[a-zA-Z]/.test(w)).length;
            return Math.ceil(koreanCount + englishWords * 1.3);
        }

        window.estimateTokens = estimateTokens;
    </script>
</body>
</html>
